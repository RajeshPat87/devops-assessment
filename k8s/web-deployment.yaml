apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: hello-web
    app.kubernetes.io/part-of: demo-app
  name: hello-web
  namespace: demo-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    email: "rajeshsqldba87@gmail.com"
  labels:
    app.kubernetes.io/name: hello-web
    app.kubernetes.io/part-of: demo-app
    owner: rajesh
  name: hello-web
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-web
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-web
        app.kubernetes.io/part-of: demo-app
    spec:
      containers:
        - env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  key: DB_USER
                  name: db-credentials
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: DB_PASSWORD
                  name: db-credentials
          envFrom:
            - configMapRef:
                name: web-config
          image: hello-web:1.0.0   # loaded into kind via `kind load docker-image`
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          name: web
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      restartPolicy: Always
      securityContext:
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: hello-web
      volumes:
        - emptyDir: {}   # writable /tmp because root filesystem is read-only
          name: tmp
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: hello-web
    app.kubernetes.io/part-of: demo-app
  name: hello-web
  namespace: demo-app
spec:
  ports:
    - name: http
      nodePort: 30080   # mapped to host port 8080 in the kind config
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: hello-web
  type: NodePort
