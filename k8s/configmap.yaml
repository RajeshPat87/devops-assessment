apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: demo-app
  labels:
    app.kubernetes.io/name: hello-web
    app.kubernetes.io/part-of: demo-app
data:
  # Non-sensitive configuration only. Anything secret lives in db-credentials.
  APP_ENV: "lab"
  GREETING: "Hello World from Kubernetes"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "appdb"
