apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-web
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: hello-web
    {{- include "hello-app.commonLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-web
  namespace: {{ .Release.Namespace }}
  annotations:
    email: {{ .Values.owner.email | quote }}
  labels:
    owner: {{ .Values.owner.name }}
    app.kubernetes.io/name: hello-web
    {{- include "hello-app.commonLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime rollout even on a single node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-web
        app.kubernetes.io/part-of: demo-app
    spec:
      restartPolicy: Always
      serviceAccountName: hello-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: web-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}        # writable /tmp because the root fs is read-only
---
apiVersion: v1
kind: Service
metadata:
  name: hello-web
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: hello-web
    {{- include "hello-app.commonLabels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    app.kubernetes.io/name: hello-web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      {{- if eq .Values.web.service.type "NodePort" }}
      nodePort: {{ .Values.web.service.nodePort }}
      {{- end }}
