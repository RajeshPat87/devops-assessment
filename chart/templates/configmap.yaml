apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: hello-web
    {{- include "hello-app.commonLabels" . | nindent 4 }}
# Non-sensitive configuration only. Anything secret lives in db-credentials.
data:
  APP_ENV: {{ .Values.config.APP_ENV | quote }}
  GREETING: {{ .Values.config.GREETING | quote }}
  DB_HOST: {{ .Values.config.DB_HOST | quote }}
  DB_NAME: {{ .Values.config.DB_NAME | quote }}
  DB_PORT: {{ .Values.config.DB_PORT | quote }}
