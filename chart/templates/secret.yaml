apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello-app.commonLabels" . | nindent 4 }}
# Lab-only Secret rendered from values for reproducibility.
# In a real environment these values would NOT live in values.yaml; they would
# come from External Secrets Operator (Key Vault / Secrets Manager), Sealed
# Secrets, or SOPS. See DESIGN.md > Trade-offs.
type: Opaque
stringData:
  DB_USER: {{ .Values.secret.DB_USER | quote }}
  DB_PASSWORD: {{ .Values.secret.DB_PASSWORD | quote }}
  POSTGRES_DB: {{ .Values.secret.POSTGRES_DB | quote }}
