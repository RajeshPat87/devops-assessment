name: ci-cd

# Triggers on code changes to the app, manifests, or the pipeline itself.
# Both master and main are watched so the pipeline runs regardless of the
# repo's default-branch naming; workflow_dispatch allows manual validation.
on:
  push:
    branches: [master, main]
    paths:
      - "app/**"
      - "chart/**"
      - ".github/workflows/ci-cd.yaml"
  pull_request:
    branches: [master, main]
    paths:
      - "app/**"
      - "chart/**"
  workflow_dispatch:

env:
  IMAGE: hello-web
  TAG: ${{ github.sha }}

jobs:
  # -------------------------------------------------------------
  # 1. VALIDATE - fail fast before anything is built or deployed
  # -------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart (helm lint)
        run: helm lint chart/

      # Render the chart and lint the resulting manifests, so kube-linter
      # checks exactly what Helm will apply to the cluster.
      - name: Render chart
        run: |
          mkdir -p rendered
          helm template hello-app chart/ --namespace demo-app > rendered/manifests.yaml

      - name: Lint rendered manifests (kube-linter)
        uses: stackrox/kube-linter-action@v1
        with:
          directory: rendered
          config: .kube-linter.yaml

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile

  # -------------------------------------------------------------
  # 2. BUILD + SCAN
  # -------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t $IMAGE:$TAG -t $IMAGE:1.0.0 app/

      - name: Scan image (Trivy - fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: hello-web:1.0.0
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Save image artifact
        run: docker save $IMAGE:1.0.0 -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: image
          path: image.tar
          retention-days: 1

  # -------------------------------------------------------------
  # 3. DRY-RUN + DEPLOY
  # An ephemeral kind cluster in CI plays the role of the target
  # cluster so every run is reproducible from scratch. Against a
  # long-lived cluster this job would instead use environment
  # protection rules and a kubeconfig from OIDC/secrets.
  # -------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ci

      - uses: actions/download-artifact@v4
        with:
          name: image

      - name: Load image into kind
        run: |
          docker load -i image.tar
          kind load docker-image hello-web:1.0.0 --name ci

      - name: Create namespace
        run: kubectl create namespace demo-app --dry-run=client -o yaml | kubectl apply -f -

      # DRY-RUN stage: server-side dry-run renders the chart and validates it
      # against the real API server (admission, schema, immutable fields)
      # without persisting anything. This is the k8s equivalent of terraform plan.
      - name: Helm dry-run (server-side)
        run: helm upgrade --install hello-app chart/ --namespace demo-app --dry-run=server

      - name: Deploy chart (--wait blocks until pods are Ready)
        run: helm upgrade --install hello-app chart/ --namespace demo-app --wait --timeout 180s

      - name: Smoke test
        run: |
          set -euo pipefail

          # Start the port-forward and make sure it is torn down on exit.
          kubectl -n demo-app port-forward svc/hello-web 8080:80 &
          pf_pid=$!
          trap 'kill "$pf_pid" 2>/dev/null || true' EXIT

          # Wait until the port-forward is actually accepting connections
          # rather than assuming a fixed sleep is long enough.
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:8080/healthz; then
              break
            fi
            [ "$i" -eq 30 ] && { echo "port-forward never became reachable"; exit 1; }
            sleep 2
          done

          # /readyz opens a fresh DB connection on every call, so a single
          # transient blip should not fail the pipeline. Retry until ready.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/readyz; then
              break
            fi
            [ "$i" -eq 30 ] && { echo "/readyz never returned healthy"; exit 1; }
            sleep 2
          done

          # The root endpoint opens a fresh DB connection and performs a write
          # (CREATE TABLE + INSERT) on every call, so like /readyz a single
          # transient blip against the just-started database should not fail the
          # pipeline. Retry until it returns a healthy 200.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ -o response.json; then
              break
            fi
            [ "$i" -eq 30 ] && { echo "/ never returned 200"; cat response.json 2>/dev/null || true; exit 1; }
            sleep 2
          done
          cat response.json
          grep -q "Hello World" response.json
