checks:
  addAllBuiltIn: true
  exclude:
    # Postgres official image needs to run as its own user (uid 999);
    # the web tier enforces runAsNonRoot explicitly.
    - "run-as-non-root"
    # Single-node lab: anti-affinity across nodes is not possible.
    - "no-anti-affinity"
    # NodePort is intentional for local access; would be Ingress/LB in prod.
    - "exposed-services"
    # Single-node lab: 3 replicas cannot be scheduled and add no HA value here.
    - "minimum-three-replicas"
    # Single-node lab: node-affinity has nothing to target with one node.
    - "no-node-affinity"
    # Cluster runs kube-dns defaults; per-pod DNSConfig is unnecessary for a lab.
    - "dnsconfig-options"
    # Lab has no NetworkPolicy; traffic isolation would be added in prod.
    - "non-isolated-pod"
    # The postgres official image only accepts credentials via env vars, and the
    # web app reads DB creds from env; file-mounted secrets need app changes.
    - "read-secret-from-env-var"
    # CI lints the *rendered* Helm chart. sorted-keys is a readability check for
    # hand-authored YAML; key order in generated output is set by the templates
    # and carries no meaning, so it is not enforced here.
    - "sorted-keys"
